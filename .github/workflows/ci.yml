name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libgdk-pixbuf-2.0-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings

  frontend-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb
        with:
          version: 10.28.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test:frontend
      - run: pnpm run build:desktop

  desktop-smoke:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb
        with:
          version: 10.28.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/desktop exec playwright install chromium
      - run: pnpm run test:e2e
      - run: pnpm run smoke:desktop
      - run: pnpm run package:smoke
      - run: pnpm run release:preflight
      - run: pnpm run updater:scaffold
      - run: pnpm run release:bundle
      - run: pnpm run release:validate-feed
      - uses: actions/upload-artifact@v4
        with:
          name: shipkit-release-results-macos
          path: .release-results
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14
